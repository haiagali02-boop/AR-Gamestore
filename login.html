<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | AR Gamestore</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body class="auth-body">
    <header>
      <div class="container logo-container">
        <div class="logo">
          <i class="fab fa-xbox"></i>
          <span>AR</span> GAMESTORE
        </div>
        <nav>
          <a href="index.html">Home</a>
        </nav>
      </div>
    </header>

    <main class="auth-main">
      <div class="auth-container animate-fade">
        <div class="auth-card" id="auth-card">
          <!-- Toggle Tabs -->
          <div class="auth-tabs">
            <button class="auth-tab active" id="login-tab">Login</button>
            <button class="auth-tab" id="signup-tab">Sign Up</button>
          </div>

          <!-- Loading Spinner -->
          <div id="loading-spinner" class="spinner-overlay" style="display: none">
            <div class="spinner"></div>
          </div>

          <!-- Login Form -->
          <div id="login-form-container">
            <h2 class="auth-title">Welcome Back</h2>
            <form id="login-form">
              <div class="form-group">
                <label for="login-email">Email Address</label>
                <input type="email" id="login-email" required placeholder="Enter your email" />
              </div>
              <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" required placeholder="Enter your password" />
              </div>
              <button type="submit" class="auth-btn" id="login-btn">Login</button>
            </form>
          </div>

          <!-- Signup Form -->
          <div id="signup-form-container" style="display: none">
            <h2 class="auth-title">Create Account</h2>
            <form id="signup-form">
              <div class="form-group">
                <label for="signup-email">Email Address</label>
                <input type="email" id="signup-email" required placeholder="Choose an email" />
              </div>
              <div class="form-group">
                <label for="signup-password">Password</label>
                <input type="password" id="signup-password" required placeholder="Create a password" />
              </div>
              <button type="submit" class="auth-btn signup-btn" id="signup-btn">Create Account</button>
            </form>
          </div>

          <!-- Error Message -->
          <div id="auth-error" class="auth-error-msg" style="display: none"></div>
        </div>
      </div>
    </main>

    <footer>
      <div class="container">
        <p style="font-size: 0.9rem; color: #555">
          &copy; 2026 AR Gamestore. All rights reserved.
        </p>
      </div>
    </footer>

    <!-- Firebase SDK (v10) -->
    <script type="module" src="script.js"></script>
  </body>
</html>
