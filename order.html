<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Complete Your Order | AR Gamestore</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <div class="container">
        <a href="index.html" class="logo">
          <i class="fab fa-xbox"></i>
          <span>AR</span> GAMESTORE
        </a>
      </div>
    </header>

    <main>
      <div class="container">
        <div class="form-container animate-fade">
          <h2 class="form-title">Complete Your Order</h2>
          <form
            action="https://formsubmit.co/d4d77dbb32a266c7bef10c590cfb2911"
            method="POST"
          >
            <!-- FormSubmit Configuration -->
            <input
              type="hidden"
              name="_next"
              value="https://ali-haddou.github.io/devweb/success.html"
            />
            <input
              type="hidden"
              name="_subject"
              value="New Xbox Game Pass Order!"
            />
            <input type="hidden" name="_captcha" value="false" />

            <div class="form-group">
              <label for="first_name">First Name</label>
              <input
                type="text"
                id="first_name"
                name="first_name"
                required
                placeholder="Enter your first name"
              />
            </div>

            <div class="form-group">
              <label for="last_name">Last Name</label>
              <input
                type="text"
                id="last_name"
                name="last_name"
                required
                placeholder="Enter your last name"
              />
            </div>

            <div class="form-group">
              <label for="email">Email Address</label>
              <input
                type="email"
                id="email"
                name="email"
                required
                placeholder="Where should we send your code?"
              />
            </div>

            <div class="form-group">
              <label for="phone">Phone Number</label>
              <input
                type="tel"
                id="phone"
                name="phone"
                required
                placeholder="Enter your phone number"
              />
            </div>

            <button type="submit" class="buy-btn">Proceed to Payment</button>
          </form>
        </div>
      </div>
    </main>

    <footer>
      <div class="container">
        <p class="footer-text">
          &copy; 2026 AR Gamestore. Secure digital delivery.
        </p>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
