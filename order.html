<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Complete Your Order | AR Gamestore</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <div class="container">
        <a href="index.html" class="logo">
          <i class="fab fa-xbox"></i>
          <span>AR</span> GAMESTORE
        </a>
      </div>
    </header>

    <main>
      <div class="container">
        <div class="form-container animate-fade">
          <h2 class="form-title">Complete Your Order</h2>
          <form
            id="order-form"
            action="https://formsubmit.co/d4d77dbb32a266c7bef10c590cfb2911"
            method="POST"
          >
            <!-- Form Fields -->
            <div class="form-group">
              <label for="first_name">First Name</label>
              <input type="text" id="first_name" name="first_name" required />
            </div>
            <div class="form-group">
              <label for="last_name">Last Name</label>
              <input type="text" id="last_name" name="last_name" required />
            </div>
            <div class="form-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" name="email" required />
            </div>
            <div class="form-group">
              <label for="phone">Phone Number</label>
              <input type="tel" id="phone" name="phone" required />
            </div>
          </form>

          <!-- PayPal Button -->
          <div id="paypal-button-container" style="margin-top: 30px"></div>
        </div>
      </div>

      <!-- Thank You Popup -->
      <div id="thank-you-popup" class="popup-overlay" style="display: none">
        <div class="popup-content">
          <div class="success-icon">
            <i class="fas fa-check-circle"></i>
          </div>
          <h2 class="success-title">Thank You!</h2>
          <p class="success-text">
            Your payment was successful. Your Game Pass code will be sent to
            your email shortly.
          </p>
          <a href="index.html" class="buy-btn">Return to Home</a>
        </div>
      </div>
    </main>

    <footer>
      <div class="container">
        <p class="footer-text">
          &copy; 2026 AR Gamestore. Secure digital delivery.
        </p>
      </div>
    </footer>

    <script src="https://www.paypal.com/sdk/js?client-id=AXLEMmlolbR1m43N74n8T3_-Ut5mFW9ooDTcNbMdHAh-0z8lsICfKs7b0bNEqwlq5X6et3aBmXRy5uyu&currency=USD"></script>
    <script type="module" src="script.js"></script>
  </body>
</html>
