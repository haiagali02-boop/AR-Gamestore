<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AR Gamestore | Order</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Font Awesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <!-- PayPal SDK (Placeholder - in real app, replace CLIENT_ID) -->
    <script src="https://www.paypal.com/sdk/js?client-id=sb&currency=USD"></script>
  </head>
  <body>
    <nav>
      <div class="logo">AR Gamestore</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="index.html#products">Store</a>
        <a href="order.html">Order</a>
      </div>
    </nav>

    <div class="order-container animate-fade">
      <div id="order-form-container">
        <h2>Complete Your Informations</h2>
        <form
          id="order-form"
          onsubmit="event.preventDefault(); proceedToPayment();"
          method="post"
          action="https://formsubmit.co/d4d77dbb32a266c7bef10c590cfb2911"
        >
          <div class="form-group">
            <label for="first_name">First Name</label>
            <input
              type="text"
              id="first_name"
              name="first_name"
              required
              placeholder="Enter your first name"
            />
          </div>

          <div class="form-group">
            <label for="last_name">Last Name</label>
            <input
              type="text"
              id="last_name"
              name="last_name"
              required
              placeholder="Enter your last name"
            />
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              required
              placeholder="Enter your email"
            />
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input
              type="tel"
              id="phone"
              name="phone"
              required
              placeholder="Enter your phone number"
            />
          </div>

          <button type="submit" class="submit-btn">
            Proceed to Payment Selection
          </button>
        </form>
      </div>
    </div>

    <footer>
      <div class="footer-content">
        <h3>Follow us on Instagram</h3>
        <p>Stay updated with our latest offers and gaming news!</p>
        <a
          href="https://instagram.com/ar_game.store"
          class="instagram-btn"
          target="_blank"
        >
          <i class="fab fa-instagram"></i> Follow ar_game.store
        </a>
        <p style="margin-top: 2rem; font-size: 0.9rem; color: #555">
          &copy; 2024 AR Gamestore. All rights reserved.
        </p>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
